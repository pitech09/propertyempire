{% extends "base.html" %}
{% block title %}Worker Login - PropertyEmpire{% endblock %}
{% block content %}
<div style="max-width: 500px; margin: 3rem auto;">
    <div class="card">
        <div class="card-header"><h2 class="card-title">Worker Login</h2></div>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Your username" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Your password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
        </form>
        <div style="margin-top: 1rem; text-align: center;">
            <a href="{% url 'worker_register' %}" style="color: var(--primary); text-decoration: none;">New worker? Register here</a>
        </div>
    </div>
</div>
{% endblock %}
