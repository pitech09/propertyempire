{% comment %}
  PropertyEmpire - Enhanced UX partial
  Includes extra styles and JS to enrich all pages extending base.html.
  Loaded by {% include "_ux_partial.html" %} inside {% block extra_head %}.
{% endcomment %}
<style>
/* ===================================================== */
/* === ENHANCED UX ADDITIONS (skeleton, toasts, etc) === */
/* ===================================================== */

/* Skeleton loading placeholders */
.skeleton {
    background: linear-gradient(90deg,
        var(--dark-elevated) 0%,
        var(--dark-card-hover) 50%,
        var(--dark-elevated) 100%);
    background-size: 200% 100%;
    animation: skeleton-shimmer 1.4s ease-in-out infinite;
    border-radius: 8px;
    color: transparent !important;
}
.skeleton-line { height: 14px; margin-bottom: 10px; border-radius: 6px; }
.skeleton-block { height: 80px; border-radius: 12px; }
.skeleton-circle { width: 48px; height: 48px; border-radius: 50%; }
@keyframes skeleton-shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}
.skeleton-table tr td { padding: 18px 1rem; }

/* Mini spinner */
.spinner-mini {
    display: inline-block;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.15);
    border-top-color: var(--primary);
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
}

/* Loading state for cards/tables */
.is-loading { position: relative; pointer-events: none; }
.is-loading > * { opacity: 0.3; transition: opacity 0.2s ease; }

/* Section header */
.section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 2.5rem 0 1rem;
}
.section-header h2 {
    font-size: 1.4rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.3px;
}
.section-subtitle {
    color: var(--text-muted);
    font-size: 0.9rem;
    margin-top: 0.2rem;
}

/* Two-column grid */
.dashboard-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
}
.dashboard-grid-3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
}
@media (max-width: 1024px) {
    .dashboard-grid, .dashboard-grid-3 { grid-template-columns: 1fr; }
}

/* Hero banner */
.hero-banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1.5rem;
    padding: 2rem 2.25rem;
    margin-bottom: 2rem;
    background:
        radial-gradient(120% 100% at 0% 0%, rgba(220,241,28,0.12) 0%, transparent 50%),
        radial-gradient(120% 100% at 100% 100%, rgba(59,130,246,0.10) 0%, transparent 50%),
        var(--dark-card);
    border: 1px solid var(--border);
    border-radius: 22px;
    position: relative;
    overflow: hidden;
}
.hero-banner::after {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
        linear-gradient(rgba(220,241,28,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(220,241,28,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    opacity: 0.6;
}
.hero-content { position: relative; z-index: 1; }
.hero-greeting {
    color: var(--text-muted);
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
    margin-bottom: 0.5rem;
}
.hero-title {
    font-size: 2.2rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.15;
    letter-spacing: -0.5px;
}
.hero-title span {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}
.hero-subtitle {
    color: var(--text-secondary);
    margin-top: 0.6rem;
    font-size: 1rem;
}
.hero-actions {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 0.6rem;
    flex-shrink: 0;
}
.hero-illustration {
    width: 130px;
    height: 130px;
    border-radius: 24px;
    background: linear-gradient(135deg, rgba(220,241,28,0.18), rgba(57,228,22,0.10));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 4rem;
    flex-shrink: 0;
    border: 1px solid rgba(220,241,28,0.18);
    position: relative;
    z-index: 1;
}
@media (max-width: 768px) {
    .hero-banner { flex-direction: column; align-items: flex-start; padding: 1.5rem; }
    .hero-illustration { width: 80px; height: 80px; font-size: 2.5rem; }
    .hero-title { font-size: 1.6rem; }
}

/* Stat card icon */
.stat-card-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    margin: 0 auto 0.75rem;
    background: var(--primary-glow);
    color: var(--primary);
}
.stat-card-icon.success { background: rgba(57,228,22,0.12); color: var(--success); }
.stat-card-icon.danger  { background: rgba(239,68,68,0.12); color: var(--danger); }
.stat-card-icon.info    { background: rgba(59,130,246,0.12); color: var(--blue); }
.stat-card-icon.warning { background: rgba(245,158,11,0.12); color: #f59e0b; }
.stat-card .stat-trend {
    margin-top: 0.4rem;
    font-size: 0.75rem;
    color: var(--text-muted);
    font-weight: 500;
}

/* Quick action tiles */
.action-tiles {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 1rem;
}
.action-tile {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.6rem;
    padding: 1.25rem;
    background: var(--dark-elevated);
    border: 1px solid var(--border);
    border-radius: 16px;
    text-decoration: none;
    color: var(--text);
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
}
.action-tile:hover {
    transform: translateY(-3px);
    border-color: rgba(220,241,28,0.35);
    background: var(--dark-card-hover);
    box-shadow: 0 12px 30px rgba(0,0,0,0.25);
}
.action-tile .tile-icon {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    background: var(--primary-glow);
    color: var(--primary);
}
.action-tile.tile-blue  .tile-icon { background: rgba(59,130,246,0.12); color: var(--blue); }
.action-tile.tile-red   .tile-icon { background: rgba(239,68,68,0.12); color: var(--danger); }
.action-tile.tile-green .tile-icon { background: rgba(57,228,22,0.12); color: var(--success); }
.action-tile.tile-amber .tile-icon { background: rgba(245,158,11,0.12); color: #f59e0b; }
.action-tile .tile-label { font-weight: 600; font-size: 0.95rem; }
.action-tile .tile-desc  { font-size: 0.78rem; color: var(--text-muted); line-height: 1.4; }

/* Toast notifications */
.toast-container {
    position: fixed;
    top: 1.5rem;
    right: 1.5rem;
    z-index: 100000;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    max-width: 360px;
}
.toast {
    background: var(--dark-card);
    border: 1px solid var(--border);
    border-left: 4px solid var(--primary);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 10px 35px rgba(0,0,0,0.4);
    animation: toastSlideIn 0.3s ease, toastFadeOut 0.3s ease 4.7s forwards;
    font-size: 0.9rem;
}
.toast.toast-success { border-left-color: var(--success); }
.toast.toast-error   { border-left-color: var(--danger); }
.toast.toast-warning { border-left-color: #f59e0b; }
.toast.toast-info    { border-left-color: var(--blue); }
.toast-icon {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 0.85rem;
    font-weight: 700;
}
.toast.toast-success .toast-icon { background: rgba(57,228,22,0.18); color: var(--success); }
.toast.toast-error   .toast-icon { background: rgba(239,68,68,0.18); color: var(--danger); }
.toast.toast-warning .toast-icon { background: rgba(245,158,11,0.18); color: #f59e0b; }
.toast.toast-info    .toast-icon { background: rgba(59,130,246,0.18); color: var(--blue); }
.toast-body { flex: 1; }
.toast-close {
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 1.2rem;
    cursor: pointer;
    line-height: 1;
}
.toast-close:hover { color: var(--text); }
@keyframes toastSlideIn {
    from { transform: translateX(120%); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
}
@keyframes toastFadeOut {
    to { transform: translateX(120%); opacity: 0; }
}

/* Tab bar */
.tab-bar {
    display: flex;
    gap: 0.4rem;
    background: var(--dark-elevated);
    padding: 5px;
    border-radius: 14px;
    border: 1px solid var(--border);
    margin-bottom: 1.5rem;
    overflow-x: auto;
}
.tab-bar button {
    background: transparent;
    border: none;
    color: var(--text-muted);
    padding: 0.65rem 1.1rem;
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    font-size: 0.88rem;
    white-space: nowrap;
    transition: all 0.2s ease;
}
.tab-bar button:hover {
    color: var(--text);
    background: var(--dark-card-hover);
}
.tab-bar button.active {
    color: var(--dark);
    background: var(--primary);
    font-weight: 600;
}
.tab-panel { display: none; }
.tab-panel.active { display: block; animation: fadeInUp 0.3s ease; }
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* Filter bar card */
.filter-bar-card {
    background: var(--dark-elevated);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.25rem;
    margin-bottom: 1.5rem;
}
.filter-bar-card form {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    align-items: end;
}
.filter-bar-card .form-group { margin: 0; min-width: 180px; }
.filter-bar-card .form-label { margin-bottom: 0.35rem; font-size: 0.8rem; }

/* Report meta */
.report-meta {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
}
.report-meta .meta-item {
    padding: 0.85rem 1rem;
    background: var(--dark-elevated);
    border: 1px solid var(--border);
    border-radius: 12px;
}
.report-meta .meta-label {
    color: var(--text-muted);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.25rem;
}
.report-meta .meta-value {
    color: var(--text);
    font-weight: 600;
    font-size: 0.95rem;
}

/* KPI grid */
.kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
}
.kpi-box {
    padding: 1.25rem;
    background: var(--dark-elevated);
    border: 1px solid var(--border);
    border-radius: 14px;
    position: relative;
}
.kpi-box .kpi-label {
    color: var(--text-muted);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
}
.kpi-box .kpi-value {
    color: var(--text);
    font-size: 1.7rem;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    margin-top: 0.35rem;
}
.kpi-box .kpi-value.success { color: var(--success); }
.kpi-box .kpi-value.danger  { color: var(--danger); }
.kpi-box .kpi-value.info    { color: var(--blue); }

/* Print styles for reports */
@media print {
    .navbar, .bg-pattern, .grid-bg, .toast-container,
    .no-print, .tab-bar, .filter-bar-card { display: none !important; }
    body { background: #fff !important; color: #000 !important; }
    .card, .kpi-box, .meta-item { background: #fff !important; color: #000 !important; border: 1px solid #ccc !important; box-shadow: none !important; }
    .page-title, .card-title, .stat-label, .kpi-label, .meta-label { color: #333 !important; }
    .stat-value, .kpi-value, .meta-value { color: #000 !important; -webkit-text-fill-color: #000 !important; }
    table { color: #000 !important; }
    th { color: #000 !important; background: #eee !important; }
    td { color: #222 !important; border-bottom: 1px solid #ddd !important; }
    .main-content { max-width: 100% !important; padding: 1rem !important; }
}
</style>

<div class="toast-container" id="toast-container"></div>

<script>
(function() {
    'use strict';

    // ====== Toasts ======
    window.showToast = function(message, type) {
        type = type || 'info';
        var container = document.getElementById('toast-container');
        if (!container) return;
        var icon = {success: '', error: '', warning: '!', info: 'i'};
        var t = document.createElement('div');
        t.className = 'toast toast-' + type;
        t.innerHTML = '<div class="toast-icon">' + icon[type] + '</div><div class="toast-body">' + message + '</div><button class="toast-close" onclick="this.parentNode.remove()">×</button>';
        container.appendChild(t);
        setTimeout(function() { if (t.parentNode) t.parentNode.removeChild(t); }, 5500);
    };

    // ====== Convert Django messages to toasts on page load ======
    document.addEventListener('DOMContentLoaded', function() {
        var alerts = document.querySelectorAll('.messages .alert');
        alerts.forEach(function(a) {
            var t = 'info';
            if (a.classList.contains('alert-success')) t = 'success';
            else if (a.classList.contains('alert-error')) t = 'error';
            else if (a.classList.contains('alert-warning')) t = 'warning';
            showToast(a.textContent.trim(), t);
        });
    });

    // ====== Tab switching (for reports page) ======
    window.activateTab = function(name) {
        var buttons = document.querySelectorAll('.tab-bar [data-tab]');
        var panels = document.querySelectorAll('.tab-panel');
        buttons.forEach(function(b) { b.classList.toggle('active', b.getAttribute('data-tab') === name); });
        panels.forEach(function(p) { p.classList.toggle('active', p.getAttribute('data-panel') === name); });
    };
    document.addEventListener('DOMContentLoaded', function() {
        var bar = document.querySelector('.tab-bar');
        if (bar) {
            bar.addEventListener('click', function(e) {
                var btn = e.target.closest('[data-tab]');
                if (btn) activateTab(btn.getAttribute('data-tab'));
            });
        }
    });

    // ====== Auto-attach spinner to form submissions ======
    document.addEventListener('submit', function(e) {
        var form = e.target;
        if (form && form.tagName === 'FORM' && !form.hasAttribute('data-no-loader')) {
            var btn = form.querySelector('button[type="submit"], input[type="submit"]');
            if (btn && !btn.disabled) {
                btn.disabled = true;
                var original = btn.innerHTML;
                btn.setAttribute('data-original', original);
                btn.innerHTML = '<span class="btn-spinner"></span>Working...';
                // Re-enable after 10s as a safety net
                setTimeout(function() {
                    btn.disabled = false;
                    if (btn.getAttribute('data-original')) {
                        btn.innerHTML = btn.getAttribute('data-original');
                    }
                }, 10000);
            }
        }
    });
})();
</script>
