{% extends "guesthouse/base_guesthouse.html" %}
{% block title %}Reports{% endblock %}
{% block content %}
<div class="gh-page-header"><h1 class="gh-page-title">Reports</h1></div>
<div class="row g-3">
    <div class="col-md-6 col-lg-3"><a href="{% url 'guesthouse:report_occupancy' %}" class="text-decoration-none">
        <div class="gh-card text-center p-4"><div style="font-size:3rem;margin-bottom:0.5rem"></div><h5>Occupancy Report</h5><p class="text-muted small">Day, week, month, year</p></div>
    </a></div>
    <div class="col-md-6 col-lg-3"><a href="{% url 'guesthouse:report_revenue' %}" class="text-decoration-none">
        <div class="gh-card text-center p-4"><div style="font-size:3rem;margin-bottom:0.5rem"></div><h5>Revenue Report</h5><p class="text-muted small">By date range & room type</p></div>
    </a></div>
    <div class="col-md-6 col-lg-3"><a href="{% url 'guesthouse:report_bookings' %}" class="text-decoration-none">
        <div class="gh-card text-center p-4"><div style="font-size:3rem;margin-bottom:0.5rem"></div><h5>Booking Report</h5><p class="text-muted small">By source & status</p></div>
    </a></div>
    <div class="col-md-6 col-lg-3"><a href="{% url 'guesthouse:report_guests' %}" class="text-decoration-none">
        <div class="gh-card text-center p-4"><div style="font-size:3rem;margin-bottom:0.5rem"></div><h5>Guest History</h5><p class="text-muted small">Stays, spend, frequency</p></div>
    </a></div>
</div>
{% endblock %}
