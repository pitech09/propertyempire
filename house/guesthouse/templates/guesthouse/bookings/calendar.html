{% extends "guesthouse/base_guesthouse.html" %}
{% block title %}Booking Calendar{% endblock %}
{% block extra_head %}
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
{% endblock %}
{% block content %}
<div class="gh-page-header"><h1 class="gh-page-title">Booking Calendar</h1></div>
<div class="gh-card"><div class="gh-card-body">
    <div id="ghCalendar"></div>
</div></div>
{% endblock %}
{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var cal = new FullCalendar.Calendar(document.getElementById('ghCalendar'), {
        initialView: 'dayGridMonth',
        headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek' },
        events: '/guesthouse/calendar/events/?start=' + new Date().toISOString().slice(0,10) + '&end=' + new Date(Date.now() + 90*86400000).toISOString().slice(0,10),
        eventClick: function(info) { window.location.href = '/guesthouse/bookings/' + info.event.id + '/'; },
        height: 'auto',
        slotMinTime: '06:00:00',
        slotMaxTime: '23:00:00',
    });
    cal.render();
});
</script>
{% endblock %}
