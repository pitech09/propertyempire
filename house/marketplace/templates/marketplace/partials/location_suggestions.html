{% if suggestions %}
<div class="mp-card rounded-3xl p-2 shadow-2xl">
    {% for suggestion in suggestions %}
    <button type="button"
            class="flex w-full items-center justify-between rounded-2xl px-4 py-3 text-left text-sm font-semibold text-slate-700 transition hover:bg-slate-100"
            onclick="document.getElementById('id_location').value='{{ suggestion|escapejs }}'; document.getElementById('marketplace-search-form').requestSubmit();">
        <span>{{ suggestion }}</span>
        <span class="text-xs uppercase tracking-[0.2em] text-slate-400">Select</span>
    </button>
    {% endfor %}
</div>
{% endif %}
