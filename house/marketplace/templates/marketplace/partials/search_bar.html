<form id="marketplace-search-form"
      class="mp-card rounded-[2rem] p-4 shadow-2xl shadow-slate-950/10"
      hx-get="{% url 'marketplace:search' %}"
      hx-target="#marketplace-results"
      hx-push-url="true"
      hx-trigger="submit"
      x-data="{ open: false }">
    <div class="grid gap-3 lg:grid-cols-5">
        <div class="relative lg:col-span-2">
            <label class="mb-2 block text-xs font-bold uppercase tracking-[0.2em] text-slate-500">Location</label>
            <input id="id_location"
                   name="location"
                   value="{{ search_form.location.value|default:'' }}"
                   class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-4 text-base font-semibold shadow-sm outline-none transition focus:border-slate-400 focus:ring-4 focus:ring-slate-200"
                   placeholder="Maseru, Masianokeng, Mazenod"
                   hx-get="{% url 'marketplace:location_suggestions' %}"
                   hx-trigger="keyup changed delay:250ms"
                   hx-target="#location-suggestions"
                   hx-swap="innerHTML"
                   x-on:focus="open = true"
                   autocomplete="off">
            <div id="location-suggestions" class="absolute left-0 right-0 top-full z-20 mt-2 max-h-72 overflow-auto"></div>
        </div>
        <div>
            <label class="mb-2 block text-xs font-bold uppercase tracking-[0.2em] text-slate-500">Check-in</label>
            <input type="date" name="check_in" value="{{ search_form.check_in.value|default:'' }}" class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-4 text-base font-semibold shadow-sm outline-none transition focus:border-slate-400 focus:ring-4 focus:ring-slate-200">
        </div>
        <div>
            <label class="mb-2 block text-xs font-bold uppercase tracking-[0.2em] text-slate-500">Check-out</label>
            <input type="date" name="check_out" value="{{ search_form.check_out.value|default:'' }}" class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-4 text-base font-semibold shadow-sm outline-none transition focus:border-slate-400 focus:ring-4 focus:ring-slate-200">
        </div>
        <div>
            <label class="mb-2 block text-xs font-bold uppercase tracking-[0.2em] text-slate-500">Guests</label>
            <input type="number" name="guests" min="1" value="{{ search_form.guests.value|default:2 }}" class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-4 text-base font-semibold shadow-sm outline-none transition focus:border-slate-400 focus:ring-4 focus:ring-slate-200">
        </div>
    </div>

    <div class="mt-4 grid gap-3 md:grid-cols-2 xl:grid-cols-5">
        <input type="text" name="property_type" value="{{ search_form.property_type.value|default:'' }}" placeholder="Property type" class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-medium shadow-sm outline-none focus:border-slate-400 focus:ring-4 focus:ring-slate-200">
        <input type="number" name="price_min" min="0" value="{{ search_form.price_min.value|default:'' }}" placeholder="Min price" class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-medium shadow-sm outline-none focus:border-slate-400 focus:ring-4 focus:ring-slate-200">
        <input type="number" name="price_max" min="0" value="{{ search_form.price_max.value|default:'' }}" placeholder="Max price" class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-medium shadow-sm outline-none focus:border-slate-400 focus:ring-4 focus:ring-slate-200">
        <input type="number" name="bedrooms" min="0" value="{{ search_form.bedrooms.value|default:'' }}" placeholder="Bedrooms" class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-medium shadow-sm outline-none focus:border-slate-400 focus:ring-4 focus:ring-slate-200">
        <input type="number" name="bathrooms" min="0" value="{{ search_form.bathrooms.value|default:'' }}" placeholder="Bathrooms" class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-medium shadow-sm outline-none focus:border-slate-400 focus:ring-4 focus:ring-slate-200">
    </div>

    <div class="mt-4 flex flex-wrap items-center gap-3">
        <label class="inline-flex items-center gap-2 rounded-full bg-slate-100 px-4 py-2 text-sm font-semibold text-slate-700">
            <input type="checkbox" name="wifi" {% if search_form.wifi.value %}checked{% endif %} class="h-4 w-4 rounded border-slate-300">
            WiFi
        </label>
        <label class="inline-flex items-center gap-2 rounded-full bg-slate-100 px-4 py-2 text-sm font-semibold text-slate-700">
            <input type="checkbox" name="parking" {% if search_form.parking.value %}checked{% endif %} class="h-4 w-4 rounded border-slate-300">
            Parking
        </label>
        <label class="inline-flex items-center gap-2 rounded-full bg-slate-100 px-4 py-2 text-sm font-semibold text-slate-700">
            <input type="checkbox" name="swimming_pool" {% if search_form.swimming_pool.value %}checked{% endif %} class="h-4 w-4 rounded border-slate-300">
            Swimming Pool
        </label>
        <label class="inline-flex items-center gap-2 rounded-full bg-slate-100 px-4 py-2 text-sm font-semibold text-slate-700">
            <input type="checkbox" name="air_conditioning" {% if search_form.air_conditioning.value %}checked{% endif %} class="h-4 w-4 rounded border-slate-300">
            Air Conditioning
        </label>
        <button type="submit" class="ml-auto inline-flex w-full items-center justify-center gap-2 rounded-full bg-slate-950 px-6 py-3 text-sm font-bold text-white shadow-lg shadow-slate-950/20 transition hover:-translate-y-0.5 md:w-auto">
            Search
        </button>
    </div>
</form>
