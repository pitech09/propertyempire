{% if properties %}
<div class="grid gap-6 md:grid-cols-2 xl:grid-cols-3">
    {% for property in properties %}
        {% include "marketplace/partials/property_card.html" with property=property %}
    {% endfor %}
</div>
{% else %}
<div class="mp-card rounded-[2rem] p-10 text-center">
    <h3 class="font-display text-2xl font-extrabold text-slate-950">No properties match this search</h3>
    <p class="mt-2 text-slate-600">Try a different location, date range, or filter combination.</p>
</div>
{% endif %}
